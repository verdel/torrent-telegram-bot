repos:
  - repo: https://github.com/python-poetry/poetry
    rev: "2.3.2"
    hooks:
      - id: poetry-check
      - id: poetry-lock

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.15.4"
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
